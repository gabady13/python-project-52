{% extends "layouts/base.html" %}

{% block content %}
<div class="py-5 text-center">
    <h1 class="display-4">Добро пожаловать в Менеджер задач</h1>
    <p class="lead">
        Приложение для управления задачами, статусами и метками.
        Организуйте работу команды эффективно и прозрачно.
    </p>

    {% if not user.is_authenticated %}
    <a href="{% url 'login' %}" class="btn btn-primary btn-lg me-2">Войти</a>
    <a href="{% url 'user_create' %}" class="btn btn-outline-primary btn-lg">Зарегистрироваться</a>
    {% endif %}
</div>
{% endblock %}
